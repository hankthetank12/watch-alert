name: Watch Inventory Check

on:
  schedule:
    - cron: '30 16 * * *'   # 12:30pm EDT (UTC-4)
    - cron: '0 23 * * *'    # 7:00pm EDT (UTC-4)
  workflow_dispatch:
    inputs:
      force_alert:
        description: 'Send test email with all current watches'
        type: boolean
        default: false

permissions:
  contents: write              # needed to save the state file back to the repo

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run inventory check
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_TO_EMAIL: ${{ secrets.ALERT_TO_EMAIL }}
          INCLUDE_PARTNER_LISTINGS: 'true'
          FORCE_ALERT: ${{ github.event.inputs.force_alert }}
        run: |
          if [ "$FORCE_ALERT" = "true" ]; then
            python main.py --once --force-alert
          else
            python main.py --once
          fi

      - name: Save updated state back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add state_*.json
          git diff --staged --quiet || git commit -m "chore: update inventory state"
          git push
